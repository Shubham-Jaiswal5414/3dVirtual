# ---- Server ----
server.port=8080

# ---- MySQL connection ----
spring.datasource.url=jdbc:mysql://localhost:3306/campus_tracking?useSSL=false&allowPublicKeyRetrieval=true&createDatabaseIfNotExist=true&serverTimezone=UTC
spring.datasource.username=
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ---- JPA / Hibernate ----
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# ---- Logging (helpful while developing) ----
logging.level.org.springframework.web=INFO
logging.level.com.campus.tracking=DEBUG

